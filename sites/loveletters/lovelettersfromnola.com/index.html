<script id="archive-gallery-js">
/* Archive rebuild: this 2013 Squarespace full-bleed slideshow needs the YUI
   runtime to lay out; statically it collapses. After load we harvest the frame
   URLs the loader resolved and present them as a simple vertical gallery. */
window.addEventListener('load', function(){
  setTimeout(function(){
    var slides = document.querySelectorAll('.slide img');
    var urls = [];
    slides.forEach(function(i){
      var u = i.getAttribute('data-src') || i.getAttribute('src');
      if (u && urls.indexOf(u) === -1) urls.push(u);
    });
    if (!urls.length) return;
    var main = document.getElementById('mainContent') || document.body;
    var wrap = document.createElement('div');
    wrap.id = 'archive-gallery';
    wrap.setAttribute('style','max-width:1000px;margin:88px auto 64px;padding:0 16px;position:static');
    urls.forEach(function(u){
      var im = document.createElement('img');
      im.src = u; im.loading = 'lazy';
      im.setAttribute('style','display:block;width:100%;height:auto;margin:0 0 5px');
      wrap.appendChild(im);
    });
    main.innerHTML = '';
    main.appendChild(wrap);
    main.setAttribute('style','position:static;width:auto;height:auto;overflow:visible');
    document.body.style.background = '#000';
  }, 700);
});
</script>
