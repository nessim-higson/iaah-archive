<script id="archive-gallery-js">
document.addEventListener('DOMContentLoaded', function(){
  var urls=[];
  document.querySelectorAll('.slide img, .sqs-gallery img').forEach(function(i){
    var u=i.getAttribute('data-src')||i.getAttribute('src');
    if(u && urls.indexOf(u)===-1) urls.push(u);
  });
  if(!urls.length) return;
  var spin=document.getElementById('loading-indicator'); if(spin) spin.style.display='none';
  var main=document.getElementById('mainContent'); if(main) main.innerHTML='';
  document.documentElement.style.overflow='hidden'; document.body.style.overflow='hidden';
  var stage=document.createElement('div'); stage.id='ll-stage';
  stage.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:#000;overflow:hidden;z-index:1';
  var track=document.createElement('div');
  track.style.cssText='position:absolute;top:0;bottom:0;left:0;display:flex;height:100%;transition:transform .7s cubic-bezier(.4,0,.2,1);width:'+(urls.length*100)+'vw';
  urls.forEach(function(u){
    var c=document.createElement('div');
    c.style.cssText='width:100vw;height:100%;flex:0 0 100vw;background:#000 center/cover no-repeat;background-image:url("'+u+'")';
    track.appendChild(c);
  });
  stage.appendChild(track);
  var cur=0,timer;
  function go(n){cur=(n+urls.length)%urls.length;track.style.transform='translateX(-'+(cur*100)+'vw)';}
  function restart(){clearInterval(timer);timer=setInterval(function(){go(cur+1);},5000);}
  function arrow(t,dx,side){
    var b=document.createElement('button');
    b.setAttribute('aria-label',dx<0?'Previous':'Next'); b.textContent=t;
    b.style.cssText='position:absolute;top:50%;transform:translateY(-50%);'+side+':24px;width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.7);background:rgba(0,0,0,.32);color:#fff;font:20px/1 sans-serif;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s ease;pointer-events:none';
    b.onclick=function(){go(cur+dx);restart();};
    return b;
  }
  var la=arrow('\u2039',-1,'left'), ra=arrow('\u203a',1,'right');
  stage.appendChild(la); stage.appendChild(ra);
  function show(el){el.style.opacity='1';el.style.pointerEvents='auto';}
  function hide(el){el.style.opacity='0';el.style.pointerEvents='none';}
  stage.addEventListener('mousemove',function(e){
    if(e.clientX < window.innerWidth/2){ show(la); hide(ra); } else { show(ra); hide(la); }
  });
  stage.addEventListener('mouseleave',function(){ hide(la); hide(ra); });
  document.body.appendChild(stage);
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowLeft'){go(cur-1);restart();} else if(e.key==='ArrowRight'){go(cur+1);restart();}
  });
  go(0); restart();
});
</script>
</body>
</html>
