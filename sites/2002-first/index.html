<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>.:: I AM ALWAYS HUNGRY ::.</title>
<meta name="description" content="I AM ALWAYS HUNGRY — Nessim Higson's first Flash site, resurrected via Ruffle.">
<style>
	html, body { height: 100%; margin: 0; padding: 0; background: #ffffff; overflow: hidden; }
	#splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #ffffff; cursor: pointer; z-index: 2; }
	#splash img { display: block; max-width: 92vw; max-height: 92vh; border: 0; }
	#flashcontent { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: #ffffff; z-index: 1; }
	/* native stage is 995x650; shown at ~65.5% of the fit-to-viewport size, centered */
	#flashcontent ruffle-player { width: min(65.46375vw, calc(65.46375vh * 995 / 650)); height: min(65.46375vh, calc(65.46375vw * 650 / 995)); display: block; background: #ffffff; }
</style>
</head>
<body>
	<div id="splash" title="enter">
		<img id="splashimg" alt="I Am Always Hungry — click to enter">
	</div>
	<div id="flashcontent"></div>

	<script src="../../ruffle/ruffle.js"></script>
	<script>
		// The original rotated through ~12 splash graphics; pick one at random, as it did.
		var graphics = [
			"splsh1.jpg","splsh2.jpg","splsh3.jpg","splsh4.jpg","splsh5.jpg",
			"splsh6.jpg","splsh7.jpg","splsh8.jpg","splsh9.jpg","splsh10.jpg",
			"old-photo.jpg","Nutrition2.jpg"
		];
		document.getElementById("splashimg").src =
			"splashgraphics/" + graphics[Math.floor(Math.random() * graphics.length)];

		window.RufflePlayer = window.RufflePlayer || {};
		window.RufflePlayer.config = {
			autoplay: "on",
			unmuteOverlay: "hidden",
			splashScreen: false,
			letterbox: "off",
			scale: "showAll",
			forceScale: true,
			backgroundColor: "#FFFFFF",
			contextMenu: "rightClickOnly",
			allowScriptAccess: true,
			openUrlMode: "confirm",
			logLevel: "warn"
		};

		var started = false;
		function enter() {
			if (started) return;
			started = true;
			document.getElementById("splash").style.display = "none";
			var host = document.getElementById("flashcontent");
			host.style.display = "flex";
			// Create + start the player INSIDE the click gesture so the site's autoplay
			// music is allowed and Ruffle boots reliably.
			var ruffle = window.RufflePlayer.newest();
			var player = ruffle.createPlayer();
			host.appendChild(player);
			var api = player.ruffle ? player.ruffle() : player;
			// hmm.swf is the site's loader: it composites frontpage.swf (home) with base.swf
			// (the who/what/where/how nav) and the section movies.
			api.load({ url: "hmm.swf", parameters: {} });
		}
		document.getElementById("splash").addEventListener("click", enter);
	</script>
</body>
</html>
