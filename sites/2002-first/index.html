<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IAAH™ / the first one — resurrected</title>
<meta name="description" content="iamalwayshungry — Nessim Higson's first Flash site, resurrected via Ruffle.">
<style>
	html, body { height: 100%; margin: 0; padding: 0; background: #101010; overflow: hidden; }
	/* fixed 600x549 stage — center it and let it scale up preserving aspect */
	#flashcontent { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
	#flashcontent ruffle-player { width: min(100vw, calc(100vh * 600 / 549)); height: min(100vh, calc(100vw * 549 / 600)); display: block; }
</style>
</head>
<body>
	<div id="flashcontent"></div>
	<script src="../../ruffle/ruffle.js"></script>
	<script>
		window.RufflePlayer = window.RufflePlayer || {};
		window.RufflePlayer.config = {
			autoplay: "on",
			unmuteOverlay: "hidden",
			splashScreen: false,
			letterbox: "on",
			scale: "showAll",
			forceScale: true,
			backgroundColor: "#FFFFFF",
			contextMenu: "rightClickOnly",
			allowScriptAccess: true,
			openUrlMode: "confirm",
			logLevel: "warn"
		};
		window.addEventListener("DOMContentLoaded", () => {
			const ruffle = window.RufflePlayer.newest();
			const player = ruffle.createPlayer();
			document.getElementById("flashcontent").appendChild(player);
			const api = player.ruffle ? player.ruffle() : player;
			// hmm.swf is the master timeline: it boots frontpage.swf + the who/what/where/how sections
			api.load({ url: "hmm.swf", parameters: {} });
		});
	</script>
</body>
</html>
