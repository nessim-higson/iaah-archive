<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IAAH™ / spring 2006 build — resurrected</title>
<meta name="description" content="iamalwayshungry — unreleased spring 2006 Flash build (app.swf), resurrected via Ruffle.">
<style>
	html, body { height: 100%; margin: 0; padding: 0; background: #ffffff; overflow: hidden; }
	#flashcontent { width: 100%; height: 100%; }
	#flashcontent ruffle-player { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
	<div id="flashcontent"></div>
	<script src="../../ruffle/ruffle.js"></script>
	<script>
		window.RufflePlayer = window.RufflePlayer || {};
		window.RufflePlayer.config = {
			autoplay: "on",
			unmuteOverlay: "hidden",
			splashScreen: false,
			letterbox: "off",
			scale: "noscale",
			backgroundColor: "#FFFFFF",
			contextMenu: "rightClickOnly",
			allowScriptAccess: true,
			openUrlMode: "confirm",
			logLevel: "warn"
		};
		window.addEventListener("DOMContentLoaded", () => {
			const ruffle = window.RufflePlayer.newest();
			const player = ruffle.createPlayer();
			document.getElementById("flashcontent").appendChild(player);
			const api = player.ruffle ? player.ruffle() : player;
			api.load({ url: "app.swf" });
		});
	</script>
</body>
</html>
