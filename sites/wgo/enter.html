<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>What's Goin On?</title>
<meta name="description" content="What's Going On — a Katrina commemorative piece pairing Lee Crum's New Orleans photography with Marvin Gaye's lyrics. Score by Joe Minadeo / patternbased. Flash microsite by iamalwayshungry (2007), resurrected via Ruffle.">
<style>
	html, body { height: 100%; margin: 0; padding: 0; background: #ffffff; overflow: hidden; }
	#flashcontent { width: 100%; height: 100%; }
	#flashcontent ruffle-player { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
	<div id="flashcontent"></div>
	<script src="../../ruffle/ruffle.js"></script>
	<script>
		// Original 2007 embed: SWFObject → resizeapp.swf (Flash 9 / AS3, NO_SCALE
		// full-browser app). It loads xml/wgo.xml (15 photo + lyric spreads) and
		// streams Marvin_Gaye.mp3 / joe_minadeo.mp3 alongside.
		window.RufflePlayer = window.RufflePlayer || {};
		window.RufflePlayer.config = {
			autoplay: "on",
			unmuteOverlay: "hidden",
			splashScreen: false,
			letterbox: "off",
			scale: "noscale",
			backgroundColor: "#FFFFFF",
			contextMenu: "rightClickOnly",
			allowScriptAccess: true,
			openUrlMode: "confirm",
			logLevel: "warn",
			// fonts.swf carries the site's own FreightBigMediumItalic glyphs
			// registered under the two device-font names the app requests
			// ("Times New Roman" via runtime htmlText, "FreightDispBoldItalic"
			// via the Nav field's tag) — so both resolve to the Freight italic
			// that the Autoplay label uses, instead of Ruffle's sans fallback.
			fontSources: ["fonts.swf"]
		};
		window.addEventListener("DOMContentLoaded", () => {
			const ruffle = window.RufflePlayer.newest();
			const player = ruffle.createPlayer();
			document.getElementById("flashcontent").appendChild(player);
			const api = player.ruffle ? player.ruffle() : player;
			api.load({ url: "resizeapp.swf?v=4" });
		});
	</script>
</body>
</html>
