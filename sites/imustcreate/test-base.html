<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>bisect: base.swf direct</title>
<style>html,body{height:100%;margin:0;background:#fff}#f{width:700px;height:550px;margin:0 auto}#f ruffle-player{width:700px;height:550px;display:block}</style>
</head>
<body>
<div id="f"></div>
<script src="../../ruffle/ruffle.js"></script>
<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = { autoplay:"on", unmuteOverlay:"hidden", splashScreen:false, letterbox:"off",
  scale:"showAll", backgroundColor:"#FFFFFF", contextMenu:"rightClickOnly", allowScriptAccess:true,
  openUrlMode:"allow", logLevel:"info" };
window.addEventListener("DOMContentLoaded", () => {
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();
  document.getElementById("f").appendChild(player);
  (player.ruffle ? player.ruffle() : player).load({ url: "base.swf" });
});
</script>
</body>
</html>
