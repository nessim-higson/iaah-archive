<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>\\ ourvice // — final delivery (4.24.09) resurrected</title>
<meta name="description" content="iamalwayshungry v8 (ourvice) — final client delivery, April 2009, resurrected via Ruffle.">
<style>
	html, body { height: 100%; margin: 0; padding: 0; background: #ffffff; }
	/* original used FitFlash('my_flash', 970, 200): fill window, never below min width */
	#my_flash { width: 100%; height: 100%; min-width: 970px; min-height: 700px; }
	#my_flash ruffle-player { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
	<div id="my_flash"></div>
	<script src="swfaddress.js"></script>
	<script src="../../ruffle/ruffle.js"></script>
	<script>
		window.RufflePlayer = window.RufflePlayer || {};
		window.RufflePlayer.config = {
			autoplay: "on",
			unmuteOverlay: "hidden",
			splashScreen: false,
			backgroundColor: "#FFFFFF",
			contextMenu: "rightClickOnly",
			allowScriptAccess: true,
			allowFullscreen: true,
			openUrlMode: "confirm",
			logLevel: "warn",
			playerVersion: 10,
			frameRate: 30
		};
		window.addEventListener("DOMContentLoaded", () => {
			const ruffle = window.RufflePlayer.newest();
			const player = ruffle.createPlayer();
			document.getElementById("my_flash").appendChild(player);
			const api = player.ruffle ? player.ruffle() : player;
			api.load({ url: "dragable.swf" });
		});
	</script>
</body>
</html>
