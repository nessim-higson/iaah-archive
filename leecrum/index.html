<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lee Crum — rebuilt</title>
<meta name="description" content="Lee Crum, New Orleans photographer. The 2007 Flash site rebuilt on the open web — same photographs, same canvas, same music, driven by the original gallery.xml data.">
<style>
	:root {
		--wall: #ffffff;
		--panel: #171716;
		--panel2: #1d1d1c;
		--ink: #c8c8c6;
		--dim: #7a7a78;
		--red: #d21e12;
		--orange: #cc3b16;
		--cyan: #74d6d0;
		--strip: 24px;
	}
	* { box-sizing: border-box; }
	html, body { height: 100%; margin: 0; overflow: hidden; }
	body {
		background: var(--wall);
		font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
		-webkit-font-smoothing: antialiased;
		color: var(--ink);
	}

	/* ================= the wall ================= */
	#stage { position: absolute; inset: 0; cursor: grab; touch-action: none; background: var(--wall); }
	#stage.dragging { cursor: grabbing; }
	#field { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; }
	.photo {
		position: absolute; transform-origin: center center;
		padding: 0; border: 0; background: none; cursor: pointer;
	}
	.photo img { display: block; width: 100%; height: 100%; }

	/* ================= edge strips ================= */
	.strip {
		position: fixed; top: 0; bottom: 0; width: var(--strip); z-index: 50;
		background: linear-gradient(180deg, #191918, #101010 40%, #161615);
		cursor: pointer; user-select: none;
	}
	.strip::after { content: ""; position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(116, 214, 208, 0.55); }
	#stripL { left: 0; } #stripL::after { right: 0; }
	#stripR { right: 0; } #stripR::after { left: 0; }
	.strip .lbl {
		position: absolute; left: 50%;
		writing-mode: vertical-rl; transform: translateX(-50%);
		font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim);
		white-space: nowrap;
	}
	#stripL .lbl.top { top: 14px; transform: translateX(-50%) rotate(180deg); }
	#stripL .lbl.bot { bottom: 14px; color: var(--cyan); transform: translateX(-50%) rotate(180deg); }
	#stripR .lbl.top { top: 14px; }

	/* ================= navigation panel ================= */
	#sidenav {
		position: fixed; top: 0; bottom: 0; left: var(--strip); width: 350px; z-index: 45;
		background:
			radial-gradient(1200px 500px at -20% -10%, rgba(255,255,255,0.045), transparent 60%),
			var(--panel);
		padding: 44px 38px;
		transform: translateX(0); transition: transform 0.45s cubic-bezier(.6,0,.2,1);
		overflow: hidden;
	}
	#sidenav.closed { transform: translateX(calc(-100% - var(--strip))); }
	#sidenav .logotype {
		font-family: Georgia, serif;
		font-size: 21px; letter-spacing: 0.52em; color: #d6d6d2;
		text-transform: uppercase; white-space: nowrap;
	}
	#sidenav .rule { height: 1px; background: #3a3a38; margin: 22px 0 26px; }
	#sidenav button {
		all: unset; display: block; cursor: pointer;
		font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
		color: var(--out, #9a9a97); line-height: 2.35;
		transition: color 0.15s ease;
		white-space: nowrap;
	}
	#sidenav button:hover { color: var(--over, #ffffff); }
	#sidenav button[aria-current="true"] { color: var(--sel, var(--orange)); }
	#sidenav #contactBtn { margin-bottom: 26px; color: #b9b9b6; }
	#sidenav #contactBtn:hover { color: #fff; }
	#sidenav #contactBtn[aria-current="true"] { color: var(--orange); }
	/* faint empty frames on the panel, like the original */
	#sidenav .deco { position: absolute; border: 10px solid rgba(0,0,0,0.5); outline: 1px solid rgba(255,255,255,0.03); pointer-events: none; }
	#sidenav .deco.d1 { width: 150px; height: 190px; left: 26px; bottom: 190px; }
	#sidenav .deco.d2 { width: 110px; height: 88px;  left: 205px; bottom: 250px; }
	#sidenav .deco.d3 { width: 190px; height: 120px; left: 60px; bottom: 40px; }

	/* ================= controls panel ================= */
	#controls {
		position: fixed; top: 0; bottom: 0; right: var(--strip); width: 230px; z-index: 45;
		background: var(--panel2);
		padding: 40px 26px;
		transform: translateX(0); transition: transform 0.45s cubic-bezier(.6,0,.2,1);
		font-size: 11px; letter-spacing: 0.06em; color: var(--dim);
	}
	#controls.closed { transform: translateX(calc(100% + var(--strip))); }
	#controls .row { margin-bottom: 14px; }
	#controls .lab { color: var(--dim); }
	#controls button { all: unset; cursor: pointer; color: var(--dim); }
	#controls button.active { color: var(--cyan); }
	#controls button:hover { color: #fff; }
	#controls input[type="range"] {
		-webkit-appearance: none; appearance: none;
		width: 100%; height: 2px; background: #3c3c3a; outline: none; margin: 10px 0 2px;
	}
	#controls input[type="range"]::-webkit-slider-thumb {
		-webkit-appearance: none; appearance: none;
		width: 9px; height: 9px; background: var(--cyan); border-radius: 0; cursor: pointer;
	}
	#controls .minmax { display: flex; justify-content: space-between; font-size: 9px; color: #55555_3; color: #555553; }
	#controls .sep { height: 26px; }
	#tracks { margin-top: 10px; }
	#tracks button { display: block; line-height: 1.9; letter-spacing: 0.04em; }
	#tracks button.active { color: var(--cyan); }
	#prevnext { margin-top: 20px; margin-bottom: 4px; color: var(--dim); }
	#prevnext button { color: var(--dim); }
	#prevnext button:hover { color: #fff; }

	/* ================= entry gate ================= */
	#gate {
		position: fixed; inset: 0; z-index: 100;
		background: #0d0d0d;
		transition: opacity 0.9s ease;
	}
	#gate.leaving { opacity: 0; pointer-events: none; }
	#gate .inner { position: absolute; left: 5vw; top: 12vh; }
	#gate .masthead {
		display: inline-flex; align-items: center; gap: 0.16em;
		font-family: Didot, "Didot LT STD", "Bodoni 72", "Playfair Display", Georgia, serif;
		font-size: clamp(60px, 10.5vw, 150px);
		letter-spacing: 0.06em; line-height: 1;
		color: #37342f; user-select: none;
	}
	#gate .masthead .c {
		display: inline-grid; place-items: center;
		width: 1.34em; height: 1.34em;
		border: 3px solid #37342f;
		box-shadow: inset 0 0 0 4px #0d0d0d, inset 0 0 0 6px #37342f;
		border-radius: 50%;
		font-size: 0.85em;
		transform: translateY(-0.03em);
	}
	#gate .choices {
		margin-top: 10px;
		font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
		color: #8f8f8c;
		display: flex; gap: 7px; align-items: baseline;
	}
	#gate .choices button { all: unset; cursor: pointer; font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #666663; }
	#gate .choices button.picked { color: #e8e8e5; }
	#gate #enter { color: var(--red); margin-left: 14px; }
	#gate #enter:hover { color: #ff2f1f; }

	@media (max-width: 760px) {
		#sidenav { width: 82vw; }
		#controls { width: 72vw; }
	}
</style>
</head>
<body>

<div id="stage"><div id="field"></div></div>

<div class="strip" id="stripL" title="Navigation">
	<span class="lbl top">Navigation</span>
	<span class="lbl bot" id="curGallery"></span>
</div>
<div class="strip" id="stripR" title="Controls">
	<span class="lbl top">Controls</span>
</div>

<div id="sidenav">
	<div class="logotype">Lee Crum</div>
	<div class="rule"></div>
	<button id="contactBtn">Contact</button>
	<div id="galleryList"></div>
	<div class="deco d1"></div><div class="deco d2"></div><div class="deco d3"></div>
</div>

<div id="controls" class="closed">
	<div class="row">
		<span class="lab">Autoplay </span>
		<button id="apOnBtn">On</button> <span>/</span> <button id="apOffBtn" class="active">Off</button>
	</div>
	<div class="row">
		<span class="lab">Delay <span id="delayVal">5</span></span>
		<input type="range" id="delay" min="5" max="15" step="1" value="5">
		<div class="minmax"><span>5</span><span>15</span></div>
	</div>
	<div class="sep"></div>
	<div class="row">
		<span class="lab">Music </span>
		<button id="musOnBtn">On</button> <span>/</span> <button id="musOffBtn" class="active">Off</button>
	</div>
	<div class="row">
		<span class="lab">Volume</span>
		<input type="range" id="vol" min="0" max="100" step="1" value="75">
	</div>
	<div id="prevnext"><button id="prevBtn">Prev</button> <span>/</span> <button id="nextBtn">Next</button></div>
	<div id="tracks"></div>
</div>

<div id="gate">
	<div class="inner">
		<div class="masthead">LEE <span class="c">C</span> RUM</div>
		<div class="choices">
			<span>Auto play</span>
			<button id="apOn">on</button>
			<span>or</span>
			<button id="apOff" class="picked">off</button>
			<button id="enter">Enter</button>
		</div>
	</div>
</div>

<audio id="player"></audio>

<script>
(async () => {
	const man = await (await fetch("manifest.json")).json();
	const galleries = man.galleries.filter(g => g.photos.some(p => p.src) && g.slug !== "contact");
	const contact = man.galleries.find(g => g.slug === "contact");

	const $ = id => document.getElementById(id);
	const field = $("field"), stage = $("stage"), player = $("player");
	const css = c => c ? "#" + c.replace(/^0x/i, "") : null;

	/* ============ camera ============ */
	const vp = () => ({
		w: Math.max(innerWidth, document.documentElement.clientWidth, 320),
		h: Math.max(innerHeight, document.documentElement.clientHeight, 240)
	});
	const cam = { x: 0, y: 0, z: 1 };
	let tween = null;
	const apply = () => field.style.transform = `translate(${cam.x}px, ${cam.y}px) scale(${cam.z})`;
	const camFor = (px, py, z) => { const v = vp(); return { x: v.w / 2 - px * z, y: v.h / 2 - py * z, z }; };
	const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
	function glideTo(target, ms = 1150) {
		if (tween) cancelAnimationFrame(tween.raf);
		const from = { ...cam }, t0 = performance.now();
		return new Promise(done => {
			tween = { raf: 0 };
			const step = now => {
				const k = Math.min(1, (now - t0) / ms), e = easeInOut(k);
				cam.x = from.x + (target.x - from.x) * e;
				cam.y = from.y + (target.y - from.y) * e;
				cam.z = from.z + (target.z - from.z) * e;
				apply();
				if (k < 1) tween.raf = requestAnimationFrame(step);
				else { tween = null; done(); }
			};
			tween.raf = requestAnimationFrame(step);
		});
	}
	function extents(p) {
		const w = p.w * p.scale / 100, h = p.h * p.scale / 100;
		const r = Math.abs(p.rotation % 180) * Math.PI / 180;
		return { w: Math.abs(w * Math.cos(r)) + Math.abs(h * Math.sin(r)),
		         h: Math.abs(w * Math.sin(r)) + Math.abs(h * Math.cos(r)) };
	}
	function frameTarget(p) {
		const e = extents(p), v = vp();
		const z = Math.min(v.w / e.w, v.h / e.h) * 0.8;
		return camFor(p.x, p.y, Math.min(z, 100 / p.scale));
	}
	function overviewTarget(g) {
		let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
		for (const p of g.photos) {
			if (!p.src) continue;
			const e = extents(p);
			x0 = Math.min(x0, p.x - e.w / 2); x1 = Math.max(x1, p.x + e.w / 2);
			y0 = Math.min(y0, p.y - e.h / 2); y1 = Math.max(y1, p.y + e.h / 2);
		}
		const v = vp();
		const z = Math.min(v.w / (x1 - x0), v.h / (y1 - y0)) * 0.86;
		return camFor((x0 + x1) / 2, (y0 + y1) / 2, z);
	}

	/* ============ galleries ============ */
	let current = null, focused = -1;
	function render(g) {
		current = g; focused = -1;
		$("curGallery").textContent = g.slug === "contact" ? "Contact" : g.name;
		field.innerHTML = "";
		g.photos.forEach((p, i) => {
			if (!p.src) return;
			const w = p.w * p.scale / 100, h = p.h * p.scale / 100;
			const el = document.createElement("button");
			el.className = "photo";
			el.style.cssText = `width:${w}px;height:${h}px;left:${p.x - w / 2}px;top:${p.y - h / 2}px;transform:rotate(${p.rotation}deg)`;
			const img = document.createElement("img");
			img.src = p.src; img.alt = p.txt || g.name; img.loading = "lazy"; img.draggable = false;
			el.appendChild(img);
			el.addEventListener("click", () => {
				if (movedFar) return;
				if (focused === i) toOverview(); else focusPhoto(i, true);
			});
			field.appendChild(el);
		});
		for (const b of $("galleryList").children) b.setAttribute("aria-current", b.dataset.slug === g.slug);
		$("contactBtn").setAttribute("aria-current", g.slug === "contact");
		const t = overviewTarget(g);
		cam.x = t.x; cam.y = t.y; cam.z = t.z * 0.92;
		apply();
		glideTo(t, 900);
	}
	function focusPhoto(i, manual) {
		const p = current.photos[i];
		if (!p || !p.src) return;
		focused = i;
		if (manual) restartDwell();
		return glideTo(frameTarget(p));
	}
	const toOverview = () => { focused = -1; return glideTo(overviewTarget(current), 1000); };

	for (const g of galleries) {
		const b = document.createElement("button");
		b.dataset.slug = g.slug;
		b.style.setProperty("--out", css(g.outColor) || "#9a9a97");
		b.style.setProperty("--over", css(g.overColor) || "#ffffff");
		b.style.setProperty("--sel", css(g.selectColor) || "#cc3b16");
		b.textContent = g.name;
		b.addEventListener("click", () => { render(g); restartDwell(); });
		$("galleryList").appendChild(b);
	}
	if (contact) $("contactBtn").addEventListener("click", () => { render(contact); restartDwell(); });

	/* ============ panels ============ */
	$("stripL").addEventListener("click", () => $("sidenav").classList.toggle("closed"));
	$("stripR").addEventListener("click", () => $("controls").classList.toggle("closed"));

	/* ============ drag ============ */
	let dragging = false, movedFar = false, sx = 0, sy = 0, ox = 0, oy = 0;
	stage.addEventListener("pointerdown", e => {
		if (tween) { cancelAnimationFrame(tween.raf); tween = null; }
		dragging = true; movedFar = false;
		sx = e.clientX; sy = e.clientY; ox = cam.x; oy = cam.y;
		stage.classList.add("dragging");
		stage.setPointerCapture(e.pointerId);
	});
	stage.addEventListener("pointermove", e => {
		if (!dragging) return;
		const dx = e.clientX - sx, dy = e.clientY - sy;
		if (Math.abs(dx) + Math.abs(dy) > 5) movedFar = true;
		cam.x = ox + dx; cam.y = oy + dy;
		apply();
	});
	const endDrag = () => { dragging = false; stage.classList.remove("dragging"); restartDwell(); };
	stage.addEventListener("pointerup", endDrag);
	stage.addEventListener("pointercancel", endDrag);
	addEventListener("keydown", e => {
		if (e.key === "Escape") toOverview();
		if (e.key === "ArrowRight") stepAuto(+1, true);
		if (e.key === "ArrowLeft") stepAuto(-1, true);
	});
	let resizeT = 0;
	addEventListener("resize", () => {
		clearTimeout(resizeT);
		resizeT = setTimeout(() => {
			if (!current || innerWidth < 100 || innerHeight < 100) return;
			if (focused >= 0) glideTo(frameTarget(current.photos[focused]), 300);
			else glideTo(overviewTarget(current), 300);
		}, 150);
	});

	/* ============ autoplay ============ */
	let autoplay = false, dwellTimer = 0, delayS = 5;
	function setAutoplay(on) {
		autoplay = on;
		$("apOnBtn").classList.toggle("active", on);
		$("apOffBtn").classList.toggle("active", !on);
		restartDwell();
	}
	function nextIndex(dir) {
		const n = current.photos.length;
		let i = focused;
		for (let k = 0; k < n; k++) { i = (i + dir + n) % n; if (current.photos[i].src) return i; }
		return -1;
	}
	function stepAuto(dir, manual) { const i = nextIndex(dir); if (i >= 0) focusPhoto(i, manual); }
	function restartDwell() {
		clearTimeout(dwellTimer);
		if (!autoplay) return;
		dwellTimer = setTimeout(async function tick() {
			if (autoplay && !dragging) { const i = nextIndex(+1); if (i >= 0) await focusPhoto(i, false); }
			dwellTimer = setTimeout(tick, delayS * 1000);
		}, delayS * 1000);
	}
	$("apOnBtn").addEventListener("click", () => setAutoplay(true));
	$("apOffBtn").addEventListener("click", () => setAutoplay(false));
	$("delay").addEventListener("input", e => {
		delayS = +e.target.value;
		$("delayVal").textContent = delayS;
		restartDwell();
	});
	$("prevBtn").addEventListener("click", () => stepAuto(-1, true));
	$("nextBtn").addEventListener("click", () => stepAuto(+1, true));

	/* ============ music — original playlist, original names ============ */
	const tracks = [
		["absolute",       "joe1"],
		["amanecer",       "joe2"],
		["luz de luna",    "joe3"],
		["corriendo",      "joe4"],
		["mirando arriba", "joe5"],
		["imaginando",     "joe6"],
		["fence",          "low-fence"],
		["snow",           "low-snow"],
		["low-kompletezz", "low-kompletezz"]
	];
	let trackIdx = 0, music = false;
	function markTrack() {
		[...$("tracks").children].forEach((b, i) => b.classList.toggle("active", i === trackIdx));
	}
	function playTrack(i) {
		trackIdx = (i + tracks.length) % tracks.length;
		player.src = `audio/${tracks[trackIdx][1]}.mp3`;
		if (music) player.play().catch(() => {});
		markTrack();
	}
	function setMusic(on) {
		music = on;
		$("musOnBtn").classList.toggle("active", on);
		$("musOffBtn").classList.toggle("active", !on);
		if (on) { if (!player.src) playTrack(trackIdx); else player.play().catch(() => {}); }
		else player.pause();
	}
	tracks.forEach(([name], i) => {
		const b = document.createElement("button");
		b.textContent = name;
		b.addEventListener("click", () => { playTrack(i); if (!music) setMusic(true); });
		$("tracks").appendChild(b);
	});
	player.volume = 0.75;
	player.addEventListener("ended", () => playTrack(trackIdx + 1));
	$("musOnBtn").addEventListener("click", () => setMusic(true));
	$("musOffBtn").addEventListener("click", () => setMusic(false));
	$("vol").addEventListener("input", e => player.volume = e.target.value / 100);
	markTrack();

	/* ============ gate ============ */
	let gateAutoplay = false;
	$("apOn").addEventListener("click", () => { gateAutoplay = true; $("apOn").classList.add("picked"); $("apOff").classList.remove("picked"); });
	$("apOff").addEventListener("click", () => { gateAutoplay = false; $("apOff").classList.add("picked"); $("apOn").classList.remove("picked"); });
	$("enter").addEventListener("click", () => {
		$("gate").classList.add("leaving");
		setTimeout(() => $("gate").remove(), 1000);
		setMusic(true);                          // as it was in 2007
		setAutoplay(gateAutoplay);
		if (gateAutoplay) stepAuto(+1, false);
	});

	render(galleries[0]);
})();
</script>
</body>
</html>
