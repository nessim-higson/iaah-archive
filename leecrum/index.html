<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LEE Ⓒ RUM — rebuilt</title>
<meta name="description" content="Lee Crum, New Orleans photographer. The 2007 Flash site rebuilt on the open web — same photographs, same layouts, driven by the original gallery.xml data.">
<style>
	:root {
		--stage: #1c1c1c;
		--panel: #242424;
		--ink: #b9b9b9;
		--dim: #6f6f6f;
		--select: #f94b07;
		--frame: #101010;
	}
	* { box-sizing: border-box; }
	html, body { height: 100%; margin: 0; overflow: hidden; }
	body {
		background: var(--stage);
		color: var(--ink);
		font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
		-webkit-font-smoothing: antialiased;
	}

	/* ---------- masthead ---------- */
	header {
		position: fixed; top: 0; left: 0; right: 0;
		padding: 26px 34px 18px;
		z-index: 40;
		pointer-events: none;
		background: linear-gradient(to bottom, rgba(20,20,20,0.92) 40%, rgba(20,20,20,0));
	}
	.masthead {
		display: inline-flex; align-items: center; gap: 0.18em;
		font-family: Didot, "Didot LT STD", "Bodoni 72", "Playfair Display", Georgia, serif;
		font-size: clamp(34px, 6vw, 64px);
		letter-spacing: 0.08em;
		color: #8f8f8f;
		user-select: none;
		line-height: 1;
	}
	.masthead .c {
		display: inline-grid; place-items: center;
		width: 1.28em; height: 1.28em;
		border: 2px solid #8f8f8f;
		box-shadow: inset 0 0 0 2.5px var(--stage), inset 0 0 0 3.5px #8f8f8f;
		border-radius: 50%;
		font-size: 0.82em;
		transform: translateY(-0.04em);
	}
	.tagline {
		margin-top: 7px;
		font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
		color: var(--dim);
	}

	/* ---------- gallery nav ---------- */
	nav {
		position: fixed; left: 34px; bottom: 30px; z-index: 40;
		display: flex; flex-direction: column; gap: 7px;
		max-height: 52vh; overflow-y: auto; scrollbar-width: none;
	}
	nav::-webkit-scrollbar { display: none; }
	nav button {
		all: unset; cursor: pointer;
		font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
		color: var(--out, #aaaaaa);
		transition: color 0.15s ease, transform 0.15s ease;
		white-space: nowrap;
	}
	nav button:hover { color: var(--over, #ffffff); transform: translateX(4px); }
	nav button[aria-current="true"] { color: var(--sel, var(--select)); }
	nav button .n { font-size: 9px; color: var(--dim); margin-left: 8px; letter-spacing: 0.1em; }

	/* ---------- photo field ---------- */
	#stage {
		position: absolute; inset: 0;
		cursor: grab;
		touch-action: none;
	}
	#stage.dragging { cursor: grabbing; }
	#field {
		position: absolute; left: 50%; top: 50%;
		will-change: transform;
	}
	.photo {
		position: absolute;
		transform-origin: center center;
		box-shadow: 0 14px 44px rgba(0,0,0,0.55);
		background: var(--frame);
		padding: 0;
		border: 0;
		cursor: pointer;
		transition: box-shadow 0.25s ease, filter 0.25s ease;
	}
	.photo img {
		display: block; width: 100%; height: 100%;
		filter: saturate(0.96);
	}
	.photo:hover { box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
	.photo:hover img { filter: saturate(1); }

	/* ---------- focus mode ---------- */
	#focus {
		position: fixed; inset: 0; z-index: 60;
		display: none;
		place-items: center;
		background: rgba(12,12,12,0.93);
		cursor: zoom-out;
	}
	#focus.open { display: grid; }
	#focus img {
		max-width: min(92vw, 1400px); max-height: 86vh;
		box-shadow: 0 30px 90px rgba(0,0,0,0.9);
	}
	#focus figcaption {
		position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
		font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink);
	}

	/* ---------- footer note ---------- */
	footer {
		position: fixed; right: 34px; bottom: 30px; z-index: 40;
		text-align: right;
		font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim);
		line-height: 2;
		pointer-events: none;
	}
	footer b { color: var(--ink); font-weight: 500; }
	@media (max-width: 700px) {
		footer { display: none; }
		nav { left: 22px; bottom: 22px; }
		header { padding: 20px 22px 14px; }
	}
</style>
</head>
<body>

<header>
	<div class="masthead">LEE <span class="c">C</span> RUM</div>
	<div class="tagline">photographer &middot; new orleans</div>
</header>

<div id="stage"><div id="field"></div></div>
<nav id="nav" aria-label="galleries"></nav>

<div id="focus" role="dialog" aria-modal="true">
	<img alt="">
	<figcaption></figcaption>
</div>

<footer>
	<span>drag to wander &middot; click to look</span><br>
	<span>rebuilt <b>2026</b> from the original <b>gallery.xml</b> &middot; 2007</span>
</footer>

<script>
(async () => {
	const man = await (await fetch("manifest.json")).json();
	// hide the engine's internal "contact" pseudo-gallery from the wall
	const galleries = man.galleries.filter(g => g.photos.some(p => p.src) && g.slug !== "contact");

	const nav = document.getElementById("nav");
	const field = document.getElementById("field");
	const stage = document.getElementById("stage");
	const focusEl = document.getElementById("focus");
	const focusImg = focusEl.querySelector("img");
	const focusCap = focusEl.querySelector("figcaption");

	const css = c => c ? "#" + c.replace(/^0x/i, "") : null;

	let panX = 0, panY = 0, current = null;

	function render(g) {
		current = g;
		panX = 0; panY = 0;
		applyPan();
		field.innerHTML = "";
		for (const p of g.photos) {
			if (!p.src) continue;
			const w = p.w * p.scale / 100;
			const h = p.h * p.scale / 100;
			const el = document.createElement("button");
			el.className = "photo";
			el.style.width = w + "px";
			el.style.height = h + "px";
			el.style.left = (p.x - w / 2) + "px";
			el.style.top = (p.y - h / 2) + "px";
			el.style.transform = `rotate(${p.rotation}deg)`;
			const img = document.createElement("img");
			img.src = p.src;
			img.alt = p.txt || g.name;
			img.loading = "lazy";
			img.draggable = false;
			el.appendChild(img);
			el.addEventListener("click", e => {
				if (moved) return;               // a drag, not a click
				focusImg.src = p.src;
				focusCap.textContent = p.txt || g.name;
				focusEl.classList.add("open");
				e.stopPropagation();
			});
			field.appendChild(el);
		}
		for (const b of nav.children) b.setAttribute("aria-current", b.dataset.slug === g.slug);
	}

	// nav
	for (const g of galleries) {
		const b = document.createElement("button");
		b.dataset.slug = g.slug;
		b.style.setProperty("--out", css(g.outColor) || "#aaaaaa");
		b.style.setProperty("--over", css(g.overColor) || "#ffffff");
		b.style.setProperty("--sel", css(g.selectColor) || "#f94b07");
		const count = g.photos.filter(p => p.src).length;
		b.innerHTML = `${g.name}<span class="n">${count}</span>`;
		b.addEventListener("click", () => render(g));
		nav.appendChild(b);
	}

	// drag-to-pan (direct control, no inertia)
	let dragging = false, moved = false, sx = 0, sy = 0, ox = 0, oy = 0;
	function applyPan() {
		field.style.transform = `translate(${panX}px, ${panY}px)`;
	}
	stage.addEventListener("pointerdown", e => {
		dragging = true; moved = false;
		sx = e.clientX; sy = e.clientY; ox = panX; oy = panY;
		stage.classList.add("dragging");
		stage.setPointerCapture(e.pointerId);
	});
	stage.addEventListener("pointermove", e => {
		if (!dragging) return;
		const dx = e.clientX - sx, dy = e.clientY - sy;
		if (Math.abs(dx) + Math.abs(dy) > 4) moved = true;
		panX = ox + dx; panY = oy + dy;
		applyPan();
	});
	const endDrag = () => { dragging = false; stage.classList.remove("dragging"); };
	stage.addEventListener("pointerup", endDrag);
	stage.addEventListener("pointercancel", endDrag);

	// focus dismiss
	focusEl.addEventListener("click", () => {
		focusEl.classList.remove("open");
		focusImg.src = "";
	});
	addEventListener("keydown", e => { if (e.key === "Escape") focusEl.classList.remove("open"); });

	render(galleries[0]);
})();
</script>
</body>
</html>
